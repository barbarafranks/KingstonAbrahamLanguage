<script>
var QS = [
  {
    "type": "std",
    "passageHtml": "<div class=\"passage-label\">Read this sentence</div><div class=\"passage-box\">Maya wanted to join the science club, ____ she had soccer practice every Tuesday after school.</div>",
    "qHtml": "Which word best completes the sentence to show the correct relationship between the two ideas?",
    "tip": "Read both parts of the sentence and ask yourself: does the second part agree with the first, give a reason, or show a problem? Match the conjunction to that relationship.",
    "hint": "The second part of the sentence describes something that gets in the way of joining the club. You need a conjunction that shows contrast or a problem.",
    "opts": [
      "but",
      "and",
      "so",
      "or"
    ],
    "ans": 0,
    "wrongs": [
      null,
      "\"And\" simply adds more information — but here the second idea is a problem that conflicts with the first, not just an extra fact.",
      "\"So\" shows a result or effect. Having soccer practice is not the result of wanting to join the club; it's an obstacle to it.",
      "\"Or\" gives a choice between two options. The sentence isn't offering choices — it's showing two ideas that disagree."
    ],
    "exp": "The correct answer is \"but.\" Coordinating conjunctions (FANBOYS: For, And, Nor, But, Or, Yet, So) each show a different relationship. \"But\" signals contrast — and here, wanting to join the club contrasts with having a scheduling conflict. A common Grade 5 mistake is defaulting to \"and\" for any two ideas, but you must match the conjunction to the actual logical relationship between the clauses.",
    "skill": "Conjunctions, Prepositions, and Interjections",
    "sc": "#185FA5",
    "sb": "#E6F1FB",
    "teks": "L.5.1.A",
    "mapsTo": "→ Grade Review",
    "n": 1
  },
  {
    "type": "std",
    "passageHtml": null,
    "qHtml": "Which sentence uses commas correctly to set off the introductory word and the tag question?",
    "tip": "Words like \"yes\" and \"no\" at the start of a sentence need a comma after them, and a tag question at the end (like \"isn't it?\" or \"didn't you?\") needs a comma before it.",
    "hint": "Look for TWO places that need a comma: right after the opening word (\"Yes\" or \"No\") AND right before the short question tacked onto the end.",
    "opts": [
      "Yes, you finished your homework, didn't you?",
      "Yes you finished your homework didn't you?",
      "Yes, you finished your homework didn't you?",
      "Yes you finished your homework, didn't you?"
    ],
    "ans": 0,
    "wrongs": [
      null,
      "This sentence is missing BOTH commas. \"Yes\" needs a comma after it because it's an introductory word, and \"didn't you?\" needs a comma before it because it's a tag question.",
      "This sentence correctly places the comma after \"Yes,\" but forgets the comma before the tag question \"didn't you?\" Tag questions must be set off with a comma.",
      "This sentence correctly places the comma before the tag question, but forgets the comma after the introductory word \"Yes.\" Introductory words like yes and no need a comma after them."
    ],
    "exp": "The correct answer uses TWO commas: one after the introductory word \"Yes\" and one before the tag question \"didn't you?\" Standard L.5.2.C requires commas to set off introductory words (yes, no, well) AND tag questions (isn't it, didn't you, won't they). A common Grade 5 mistake is remembering only one of these two commas — be sure to check both the beginning and the end of the sentence.",
    "skill": "Commas with Introductory Words and Tag Questions",
    "sc": "#633806",
    "sb": "#FAEEDA",
    "teks": "L.5.2.C",
    "mapsTo": "→ Grade Review",
    "n": 2
  },
  {
    "type": "std",
    "passageHtml": "<div class=\"passage-label\">Read this paragraph from a student's story</div><div class=\"passage-box\">Maya stepped into her grandmother's kitchen. There was bread on the counter. She felt happy. The sun was coming through the window.</div>",
    "qHtml": "Which revision best uses <span class=\"q-ul\">sensory and descriptive language</span> to help the reader experience the scene?",
    "tip": "Strong sensory writing uses specific details that appeal to the five senses (sight, sound, smell, taste, touch). Look for the choice that shows the scene instead of just telling what happened.",
    "hint": "Eliminate choices that only add more 'telling' words like 'very' or 'really.' The best answer will let you actually smell, see, or feel something specific.",
    "opts": [
      "Maya stepped into Grandma's kitchen, where the warm smell of cinnamon bread curled around her like a hug and golden sunlight spilled across the flour-dusted counter.",
      "Maya stepped into her grandmother's very nice kitchen. There was really good bread on the counter. She felt extremely happy. The bright sun was coming through the window.",
      "Maya walked into the kitchen and saw bread. The bread looked tasty. She was glad to be there. It was a sunny day outside the window.",
      "Maya entered the kitchen quickly. Grandma had made bread earlier that morning. Maya smiled because she loved visiting. The window let in light from the sun."
    ],
    "ans": 0,
    "wrongs": [
      null,
      "This revision just adds vague intensifiers like 'very,' 'really,' and 'extremely.' These words tell the reader how to feel instead of using sensory details (smell, sight, touch) that show the scene. This is the most common Grade 5 mistake — confusing 'stronger words' with 'descriptive words.'",
      "This revision swaps in slightly different verbs but still only tells what happened. Words like 'tasty,' 'glad,' and 'sunny' are general — they don't appeal to specific senses or create a clear picture in the reader's mind.",
      "This revision adds more information (when, why) but no sensory details. Knowing Grandma baked 'earlier that morning' is a fact, not a description. The reader still can't smell the bread, feel the warmth, or see the light."
    ],
    "exp": "Standard W.5.3.D asks writers to use concrete words, phrases, and sensory details to convey experiences precisely. The correct choice appeals to multiple senses: smell ('warm smell of cinnamon'), touch ('like a hug'), and sight ('golden sunlight,' 'flour-dusted counter'). The common Grade 5 misconception — shown in the wrong answers — is thinking that adding intensifiers ('very,' 'really') or extra facts makes writing more descriptive. True sensory language SHOWS the scene through the five senses rather than TELLING the reader about it.",
    "skill": "Narrative Writing: Sensory and Descriptive Language",
    "sc": "#D85A30",
    "sb": "#FAECE7",
    "teks": "W.5.3.D",
    "mapsTo": "→ Grade Review",
    "n": 3
  },
  {
    "type": "std",
    "passageHtml": null,
    "qHtml": "Which sentence has <span class=\"q-ul\">no</span> spelling errors?",
    "tip": "Read each sentence slowly and check tricky parts like double letters, silent letters, and common suffixes (-ent/-ant, -able/-ible, -tion/-sion).",
    "hint": "Watch out for words that double a consonant before adding -ed or -ing, and words that end in -ent vs -ant.",
    "opts": [
      "The students were embarrassed when they forgot their lines during the school performance.",
      "The studants were embarased when they forgot their lines during the school performence.",
      "The studients were embarressed when they forgott their lines during the school performence.",
      "The students were embarrased when they forgott their lines during the school performance."
    ],
    "ans": 0,
    "wrongs": [
      null,
      "Three words are misspelled: 'studants' (should be students), 'embarased' (missing a double 'r' — embarrassed has double r AND double s), and 'performence' (should be -ance, not -ence).",
      "'Studients' adds an extra 'i', 'embarressed' uses 'e' instead of 'a' in the middle, 'forgott' incorrectly doubles the 't' at the end, and 'performence' uses the wrong suffix.",
      "'Embarrased' is missing the second 's' (the word has double r AND double s: em-bar-rass-ed), and 'forgott' wrongly doubles the final 't'."
    ],
    "exp": "The correct sentence uses 'students', 'embarrassed' (double r, double s), and 'performance' (-ance ending). Grade 5 spelling tests often target words with double letters (embarrassed, occurred) and tricky suffix choices (-ance vs -ence). When in doubt, break the word into syllables and recall the base word: 'perform' + '-ance' = performance.",
    "skill": "Spelling Grade-Appropriate Words",
    "sc": "#633806",
    "sb": "#FAEEDA",
    "teks": "L.5.2.E",
    "mapsTo": "→ Grade Review",
    "n": 4
  },
  {
    "type": "std",
    "passageHtml": "<div class=\"passage-label\">Read this</div><div class=\"passage-box\">During the science fair, Maya wanted to know if the word <span class=\"q-ul\">conduct</span> meant \"to lead a group\" or \"to allow electricity to flow through.\" She decided to look the word up in a dictionary to be sure.</div>",
    "qHtml": "Which dictionary entry shows the meaning of <span class=\"q-ul\">conduct</span> that fits how it is used in the sentence below?<br><br><em>Copper wires <span class=\"q-ul\">conduct</span> electricity better than rubber does.</em>",
    "tip": "When a word has more than one meaning in the dictionary, plug each definition back into the sentence and see which one still makes sense.",
    "hint": "The sentence is about copper wires and electricity, not about leading people. Look for the science-related meaning, not the meaning that involves behavior or guiding.",
    "opts": [
      "con·duct (verb): to transmit or allow to pass through, as heat or electricity",
      "con·duct (verb): to lead or guide, as an orchestra or tour",
      "con·duct (noun): a person's behavior or way of acting",
      "con·duct (verb): to organize and carry out a survey or experiment"
    ],
    "ans": 0,
    "wrongs": [
      null,
      "This is the meaning of 'conduct' used when someone leads an orchestra or tour group. Wires can't lead anything — this confuses two different meanings of the same word.",
      "This is the noun form meaning 'behavior.' The sentence uses 'conduct' as a verb (an action wires do), not as a thing. Always match the part of speech to the sentence.",
      "This meaning is about running an experiment or survey. While it's a real meaning of 'conduct,' wires don't carry out experiments — they pass electricity through them."
    ],
    "exp": "When a dictionary lists multiple meanings, Grade 5 students often pick the FIRST definition or the one they recognize most. The correct strategy is to substitute each definition into the sentence and test it. Copper wires 'allow electricity to pass through' makes sense — copper wires 'lead an orchestra' does not. This question mirrors the common test pattern where students must choose the dictionary definition that matches the word's use in context, not just any valid definition.",
    "skill": "Reference Materials: Dictionaries, Glossaries, Thesauruses",
    "sc": "#993556",
    "sb": "#FBEAF0",
    "teks": "L.5.4.C",
    "mapsTo": "→ Grade Review",
    "n": 5
  },
  {
    "type": "std",
    "passageHtml": "<div class=\"passage-label\">Read this</div><div class=\"passage-box\">After soccer practice, Maya collapsed onto the couch. \"I'm so tired I could sleep for a week,\" she groaned. Her mom laughed and said, \"You're a busy bee these days — practice, homework, and piano lessons all in one afternoon!\"</div>",
    "qHtml": "What does Maya's mom mean when she calls her <span class=\"q-ul\">a busy bee</span>?",
    "tip": "When you see a phrase like \"a busy bee,\" ask yourself: is the speaker really comparing the person to an insect, or is this a common saying that means something else? Think about what bees are known for doing.",
    "hint": "This is a metaphor — Maya isn't actually an insect. What do bees do all day that reminds her mom of Maya's schedule?",
    "opts": [
      "Maya is working hard and doing many activities",
      "Maya is buzzing and making loud noises",
      "Maya has been stung by a bee at practice",
      "Maya is small and yellow like a bee"
    ],
    "ans": 0,
    "wrongs": [
      null,
      "This is a literal reading — Maya isn't actually buzzing. Metaphors compare two things by a shared quality (here, being constantly active), not by sound.",
      "This invents a story detail that isn't in the passage. Figurative language doesn't describe real events — it makes a comparison about a quality.",
      "This focuses on the bee's appearance instead of its behavior. The comparison is about how bees are always working, not what they look like."
    ],
    "exp": "\"A busy bee\" is a metaphor (and common idiom) that compares a person to a bee because bees are always working and moving from task to task. Maya's mom isn't saying Maya looks like a bee or makes buzzing sounds — she's saying Maya is constantly active, just like the passage shows with practice, homework, and piano. Grade 5 students often miss figurative language by taking it literally, so always ask what quality the two things share.",
    "skill": "Figurative Language: Similes, Metaphors, and Idioms",
    "sc": "#993556",
    "sb": "#FBEAF0",
    "teks": "L.5.5.A",
    "mapsTo": "→ Grade Review",
    "n": 6
  },
  {
    "type": "std",
    "passageHtml": "<div class=\"passage-label\">Read this</div><div class=\"passage-box\">By the time the bell rang, Maya ___ her science poster for the class showcase. She wanted it ready before her group arrived.</div>",
    "qHtml": "Which verb correctly completes the sentence in the <span class=\"q-ul\">past perfect</span> tense?",
    "tip": "Perfect tenses always use a form of <em>have</em> plus the past participle. For past perfect (an action finished before another past action), use <em>had</em> + past participle.",
    "hint": "The sentence shows one past action (the bell rang) and an earlier past action (finishing the poster). Past perfect = <em>had</em> + the -ed/-en form of the verb.",
    "opts": [
      "had finished",
      "has finished",
      "finished",
      "was finishing"

    "ans": 0,
    "wrongs": [

      "This is past progressive (<em>was</em> + -ing). It shows an action in progress in the past, not one that was already completed before another past action."
    ],
    "exp": "The correct answer is <strong>had finished</strong>. Past perfect tense uses <em>had</em> + past participle to show an action that was completed before another past action. Here, Maya completed the poster BEFORE the bell rang. A common Grade 5 mistake on L.5.1.B is confusing past perfect (<em>had</em> + participle) with present perfect (<em>has/have</em> + participle) or just using simple past — but only past perfect shows the correct sequence of two past events.",
    "skill": "Verb Tense: Perfect Tenses",
    "sc": "#185FA5",
    "sb": "#E6F1FB",
    "teks": "L.5.1.B",
    "mapsTo": "→ Grade Review",
    "n": 7
  },
  {
    "type": "std",
    "passageHtml": "<div class=\"passage-label\">Read this</div><div class=\"passage-box\">Maya wants to write about her soccer team. She needs to show that her team started practicing months ago and is still practicing now.</div>",
    "qHtml": "Which sentence uses the <span class=\"q-ul\">present perfect tense</span> correctly to show an action that started in the past and continues into the present?",
    "tip": "Present perfect tense uses 'has' or 'have' plus the past participle of the verb. It connects a past action to right now.",
    "hint": "Look for the helping verb 'has' or 'have' followed by a past participle like 'practiced' (not just 'practice' or 'practicing').",
    "opts": [
      "My team has practiced together since September.",
      "My team practiced together since September.",
      "My team is practicing together since September.",
      "My team will have practiced together since September."
    ],
    "ans": 0,
    "wrongs": [

      "This is simple past tense ('practiced'), which shows a completed action. It doesn't correctly connect the past action to the present and shouldn't be used with 'since.'",
      "This is present progressive tense ('is practicing'). It shows an ongoing action but is missing the helping verb 'has' needed to form the perfect tense with 'since.'",

    "skill": "Verb Tense: Perfect Tenses in Writing",
    "sc": "#185FA5",
    "sb": "#E6F1FB",

function render(){
  var a=document.getElementById('app');

function rQuiz(a){
  var q=QS[cur], t=tried[cur], pct=Math.round((cur/QS.length)*100);
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-label').textContent='Question '+(cur+1)+' of '+QS.length+' · '+q.skill;

  var ph=q.passageHtml||'';
  var qt='<div class="q-text">'+(q.qHtml||q.q||'')+'</div>';
  var ih='', fb='';

  if(q.type==='std'){
    ih=rStd(q,t);
    if(lastWrong&&!submitted) fb='<div class="feedback wrong">✗ '+lastWrong+'</div>';
    if(submitted) fb='<div class="feedback correct">✓ '+q.exp+'</div>';
  } else if(q.type==='dropdown'){
    ih=rDD(q);
    if(submitted) fb='<div class="feedback correct">✓ '+q.exp+'</div>';
    else if(lastWrong) fb='<div class="feedback wrong">✗ '+lastWrong+'</div>';
  }

  var hb=q.hint?'<button class="hint-btn'+(hintOn?' visible':'')+'" onclick="tHint()">'+EYE+(hintOpen?' Hide hint':' Show hint')+'</button>':'';
  var hr=q.hint?'<div class="hint-reveal'+(hintOpen?' open':'')+'"><strong>Hint:</strong> '+q.hint+'</div>':'';

  var ok=(q.type==='std')?(sel!==null&&!submitted):(ddSel!==null&&!submitted);
  var cb=!submitted?'<button class="btn btn-check"'+(ok?'':' disabled')+' onclick="doSub()">Check answer</button>':'';
  var nb=submitted?'<button class="btn btn-next" onclick="nxt()">Next question →</button>':'';
  var backCls=cur===0?'btn btn-back hidden':'btn btn-back';

  a.innerHTML=
    '<div class="badge-row"><span class="skill-badge" style="background:'+q.sb+';color:'+q.sc+'">'+q.skill+'</span><span class="maps-tag">'+q.mapsTo+'</span></div>'+
    '<div class="q-card">'+ph+qt+
    '<div class="tip-box"><div class="tip-header"><span class="tip-label">Coaching Tip</span>'+hb+'</div><div class="tip-text">'+q.tip+'</div>'+hr+'</div>'+

    var c='opt';
    if(t.indexOf(i)!==-1) c+=' wrong-tried disabled';
    else if(submitted&&i===q.ans) c+=' correct disabled';
    else if(!submitted&&sel===i) c+=' selected';
    else if(submitted) c+=' disabled';
    return '<div class="'+c+'" onclick="sO('+i+')"><div class="opt-letter">'+String.fromCharCode(65+i)+'</div><div class="opt-text">'+o+'</div></div>';
  }).join('')+'</div>';
}

function rDD(q){
  var opts=q.dropOptions.map(function(x,i){
    return '<option value="'+i+'"'+(ddSel===i?' selected':'')+'>'+x+'</option>';
  }).join('');
  var sel2=submitted
    ?'<select class="dd-select" disabled><option>'+q.dropOptions[q.ans]+'</option></select>'
    :'<select class="dd-select" onchange="sDD(this.value)"><option value="">— choose —</option>'+opts+'</select>';
  return '<div class="dropdown-row">'+(q.dropBefore||'')+' '+sel2+' '+(q.dropAfter||'')+'</div>';
}

function sO(i){ if(submitted||tried[cur].indexOf(i)!==-1)return; sel=i; lastWrong=null; render(); }
function sDD(v){ ddSel=v===''?null:parseInt(v); lastWrong=null; render(); }
function tHint(){ if(!hintOn)return; hintOpen=!hintOpen; render(); }

function doSub(){
  if(submitted)return;
  var q=QS[cur];
  if(q.type==='std'){
    if(sel===null)return;
    if(sel===q.ans){ submitted=true; scores[cur]=tried[cur].length===0; lastWrong=null; }
    else{ tried[cur].push(sel); hintOn=true; lastWrong=q.wrongs[sel]||"Not quite — use the hint for more guidance."; sel=null; }
  } else if(q.type==='dropdown'){
    if(ddSel===null)return;
    if(ddSel===q.ans){ submitted=true; scores[cur]=tried[cur].length===0; lastWrong=null; }
    else{ tried[cur].push(ddSel); hintOn=true; lastWrong="That word doesn't match the direction or meaning of the original. Use the hint."; ddSel=null; }
  }
  render();
}

function nxt(){
  if(cur<QS.length-1){
    cur++; sel=null; ddSel=null; submitted=false; lastWrong=null; hintOn=false; hintOpen=false; render();
  } else {
    STATE='results';
    document.getElementById('prog-fill').style.width='100%';
    document.getElementById('prog-label').textContent='Complete!';
    var _ft=scores.filter(function(s){return s===true;}).length;
    var _pct=Math.round(_ft/QS.length*100);
    // Build per-skill breakdown
    var _sm={};
    QS.forEach(function(q,i){
      var key=q.mapsTo||q.skill;
      if(!_sm[key])_sm[key]={skill:q.skill,standard:q.mapsTo||'',ok:0,tot:0};
      _sm[key].tot++;
      if(scores[i]===true)_sm[key].ok++;
    });
    var _skills=Object.keys(_sm).map(function(k){
      var d=_sm[k];
      return {standard:d.standard,skill:d.skill,ok:d.ok,tot:d.tot,pct:Math.round(d.ok/d.tot*100),needsPractice:d.ok<d.tot};
    });
    try{localStorage.setItem('doom_score_kingston_abraham',JSON.stringify({student:'Kingston Abraham',grade:5,score:_pct,first_try:_ft,total:QS.length,ts:new Date().toISOString(),synced:false,skills:_skills}));}catch(e){}
    _saveStatus='pending';
    render();
    fetch('http://localhost:8421/score',{method:'POST',mode:'cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({student:'Kingston Abraham',grade:5,score:_pct,first_try:_ft,total:QS.length,skills:_skills})})
    .then(function(){
      _saveStatus='ok';
      try{var d=JSON.parse(localStorage.getItem('doom_score_kingston_abraham')||'{}');d.synced=true;localStorage.setItem('doom_score_kingston_abraham',JSON.stringify(d));}catch(e){}
      var el=document.getElementById('score-save-status');
      if(el) el.innerHTML='<span style="color:#1D9E75;font-weight:600">&#10003; Score saved</span>';
    })
    .catch(function(){
      _saveStatus='fail';
      var el=document.getElementById('score-save-status');
      if(el) el.innerHTML='<span style="color:#E24B4A;font-weight:600">&#9888; Server offline — tell your teacher: <strong>'+_pct+'%</strong></span>';
    });
  }
}

function bk(){
  if(cur===0)return;
  cur--; sel=null; ddSel=null;
  submitted=scores[cur]!==null;
  lastWrong=null; hintOn=false; hintOpen=false;
  render();
}

function rResults(a){
  var ft=scores.filter(function(s){return s===true;}).length, tot=QS.length, pct=Math.round((ft/tot)*100);
  var sm={};
  QS.forEach(function(q,i){
    if(!sm[q.skill]) sm[q.skill]={tot:0,ok:0};
    sm[q.skill].tot++;
    if(scores[i]===true) sm[q.skill].ok++;
  });
  var rows=Object.keys(sm).map(function(sk){
    var d=sm[sk], ok=d.ok===d.tot;
    return '<tr><td>'+sk+'</td><td>'+d.ok+' / '+d.tot+'</td><td><span class="'+(ok?'pill-ok':'pill-no')+'">'+(ok?'✓ Mastered':'⚠ Review')+'</span></td></tr>';
  }).join('');
  var r=52, c=2*Math.PI*r, d=(pct/100)*c;
  var _st=_saveStatus==='ok'?'<span style="color:#1D9E75;font-weight:600">&#10003; Score saved</span>':_saveStatus==='fail'?'<span style="color:#E24B4A;font-weight:600">&#9888; Server offline &#8212; tell your teacher: <strong>'+pct+'%</strong></span>':_saveStatus==='pending'?'<span style="color:#888">Saving score&#8230;</span>':'';
  a.innerHTML='<div class="results-card">'+
    '<div class="score-ring"><svg width="120" height="120" viewBox="0 0 120 120">'+
    '<circle cx="60" cy="60" r="'+r+'" fill="none" stroke="#e5e3f7" stroke-width="12"/>'+
    '<circle cx="60" cy="60" r="'+r+'" fill="none" stroke="#534AB7" stroke-width="12" stroke-dasharray="'+d.toFixed(1)+' '+c.toFixed(1)+'" stroke-linecap="round"/>'+
    '</svg><div class="score-pct">'+pct+'%</div></div>'+
    '<div class="results-title">Practice Complete!</div>'+
    '<div class="results-sub">'+ft+' of '+tot+' first-try correct · Targeted for N/A</div>'+
    '<table class="skill-table"><thead><tr><th>Skill</th><th>Score</th><th>Status</th></tr></thead><tbody>'+rows+'</tbody></table>'+
    '<div style="margin-bottom:20px;display:flex;flex-wrap:wrap;gap:10px;justify-content:center">'+
    '<button class="btn" style="background:#f0eefd;color:#534AB7;border:2px solid #534AB7" onclick="goReview()">Review all answers</button>'+
    '<button class="btn" style="background:#534AB7;color:#fff" onclick="restart()">Practice again</button>'+
    '<button id="copy-insights-btn" class="btn" style="background:#fff7e6;color:#b45309;border:2px solid #f59e0b" onclick="copyInsights()">&#128203; Copy insights for plan</button>'+
    '</div>'+
    '<div id="score-save-status" style="font-size:13px;min-height:20px">'+_st+'</div>'+
    '</div>';
}

function copyInsights(){
  var ft=scores.filter(function(s){return s===true;}).length, tot=QS.length, pct=Math.round((ft/tot)*100);
  var sm={};
  QS.forEach(function(q,i){
    var key=q.mapsTo||q.skill;
    if(!sm[key])sm[key]={skill:q.skill,standard:q.mapsTo||'',ok:0,tot:0};
    sm[key].tot++;
    if(scores[i]===true)sm[key].ok++;
  });
  var needs=[], mastered=[];
  Object.keys(sm).forEach(function(k){
    var d=sm[k];
    var line=(d.standard?d.standard+' — ':'')+d.skill+' ('+d.ok+'/'+d.tot+' correct)';
    if(d.ok<d.tot) needs.push('⚠ '+line);
    else mastered.push('✓ '+line);
  });
  var dt=new Date().toLocaleDateString();
  var txt='Kingston Abraham — N/A Practice Test ('+dt+')\n'
    +'Score: '+pct+'% ('+ft+'/'+tot+' first try)\n';
  if(needs.length) txt+='\nNeeds more practice:\n'+needs.join('\n');
  if(mastered.length) txt+='\n\nMastered:\n'+mastered.join('\n');
  navigator.clipboard.writeText(txt)
    .then(function(){
      var btn=document.getElementById('copy-insights-btn');
      if(btn){btn.textContent='✓ Copied!';setTimeout(function(){btn.textContent='📋 Copy insights for plan';},2200);}
    })
    .catch(function(){alert(txt);});
}

function restart(){
  cur=0; sel=null; ddSel=null; submitted=false;
  scores=QS.map(function(){return null;});
  tried=QS.map(function(){return [];});
  lastWrong=null; hintOn=false; hintOpen=false; STATE='quiz'; _saveStatus='';
  document.getElementById('prog-fill').style.width='0%';
  render();
}

function goResults(){ STATE='results'; render(); }
function goReview(){ STATE='review'; render(); }

function rReview(a){
  var html='<div class="rev-top">'+
    '<button class="btn" style="background:#f0eefd;color:#534AB7;border:2px solid #534AB7" onclick="goResults()">← Back to results</button>'+
    '<button class="btn" style="background:#534AB7;color:#fff" onclick="restart()">Practice again</button>'+
    '</div>';
  QS.forEach(function(q,i){
    var ft=scores[i]===true, t=tried[i], att=t.length+1;
    var lbl=ft?'✓ First try':'✗ Needed '+att+' attempt'+(att>1?'s':'');
    var cls='rev-card '+(ft?'ft':'nr');
    var ph=q.passageHtml?q.passageHtml.replace('passage-box','rev-pass'):'';
    var qt=q.qHtml||q.q||'';
    var arr=q.type==='dropdown'?q.dropOptions:q.opts;
    var oh=arr.map(function(x,j){
      var oc='rev-opt '+(j===q.ans?'c':t.indexOf(j)!==-1?'w':'n');
      return '<div class="'+oc+'"><strong>'+String.fromCharCode(65+j)+'.</strong> '+x+'</div>';
    }).join('');
    html+='<div class="'+cls+'">'+
      '<div class="rev-label">'+
        '<span style="color:'+q.sc+'">'+q.skill+' · '+q.teks+' · '+q.mapsTo+'</span>'+
        '<span style="color:'+(ft?'#145a38':'#8B1A1A')+'">'+lbl+'</span>'+
      '</div>'+
      ph+'<div class="rev-q">'+qt+'</div>'+oh+
      '<div class="rev-exp"><strong>Why:</strong> '+q.exp+'</div>'+
    '</div>';
  });
  a.innerHTML=html;
}

render();
</script>
</body>
</html>
