    "passageHtml": "<div class=\"passage-label\">Read this sentence</div><div class=\"passage-box\">Wow, Maya wanted to join the science club, but she had soccer practice after school on Tuesdays.</div>",

    "tip": "Conjunctions join words, phrases, or clauses. The FANBOYS (for, and, nor, but, or, yet, so) connect two complete ideas. Prepositions show position or time, and interjections show emotion.",
    "hint": "Look for a word that connects two complete thoughts that could each stand alone as a sentence. Ignore words that show emotion or location.",

    "ans": 0,

      null,
      "'After' is a preposition here — it shows WHEN (time relationship with 'school'), not a connector between two equal ideas. This is a common mix-up because 'after' CAN sometimes be a subordinating conjunction, but in this sentence it links a noun phrase, not two clauses.",
      "'Wow' is an interjection, not a conjunction. Interjections express sudden emotion or reaction and are usually set off by a comma. They don't connect ideas — they just add feeling.",
      "'Wanted' is a verb (an action word), not a conjunction. Verbs tell what the subject does; they don't join clauses together."
    ],
    "exp": "The conjunction is 'but' — it's a coordinating conjunction (one of the FANBOYS) that joins two independent clauses: 'Maya wanted to join the science club' AND 'she had soccer practice after school on Tuesdays.' This question mirrors the test pattern of distinguishing conjunctions from prepositions (after), interjections (Wow), and other parts of speech in the same sentence. Remember: conjunctions CONNECT, prepositions show POSITION/TIME with a noun, and interjections show EMOTION.",

    "n": 1

  {
    "type": "std",
    "passageHtml": "<div class=\"passage-label\">Read this draft from a student's narrative</div><div class=\"passage-box\">Maya stepped onto the beach. The sand was there. The waves were in the ocean. She felt happy about her vacation.</div>",
    "qHtml": "The writer wants to revise the paragraph to use <span class=\"q-ul\">sensory and descriptive language</span> that helps the reader experience the scene. Which revision BEST does this?",
    "tip": "Sensory language appeals to the five senses — sight, sound, smell, touch, and taste. Look for the choice that shows specific details a reader can picture or feel, not just one that adds more words or feelings.",
    "hint": "Skip choices that only tell you how Maya felt or that just add adjectives like 'nice' and 'pretty.' Find the one that lets you HEAR, SEE, or FEEL the beach.",

      "Maya's bare toes sank into the warm, gritty sand as salty waves crashed and hissed against the shore.",

    "ans": 0,

      null,
      "This adds adjectives like 'nice,' 'pretty,' and 'big,' but those are vague describing words — not sensory details. The reader still can't picture, hear, or feel the scene.",

    ],
    "exp": "Choice A uses sensory language: touch ('warm, gritty sand,' 'bare toes sank'), sound ('crashed and hissed'), and taste/smell ('salty'). This matches the W.5.3.D pattern of using concrete sensory words and phrases to convey experiences and events precisely — a common Grade 5 misconception is thinking that ANY extra adjectives or feeling words count as 'descriptive,' but the standard specifically asks for details that engage the five senses.",
    "skill": "Narrative Writing: Sensory and Descriptive Language",

  {

    "qHtml": "Which sentence is spelled <span class=\"q-ul\">correctly</span>?",
    "tip": "Watch for words that double a consonant when adding -ed or -ing, and words with silent letters or tricky vowel patterns. Say each word slowly in your head and check each syllable.",
    "hint": "Look carefully at the word that means 'happening' or 'taking place.' Does it follow the rule for doubling the final consonant before adding -ing?",
    "opts": [

      "We were plannning a surprise party for our teacher."
    ],
    "ans": 1,
    "wrongs": [
      "This misses the doubled consonant rule. When a one-syllable word ends in a single vowel + single consonant (plan), you double the final consonant before adding -ing: planning, not planing.",
      null,
      "This adds an extra 'e' that doesn't belong. The base word 'plan' simply doubles the 'n' before -ing; you don't keep or add an 'e' in the middle.",

    ],
    "exp": "The correct spelling is 'planning.' This question targets the Grade 5 doubling rule (1-1-1 rule): when a one-syllable word ends in one vowel followed by one consonant, double the final consonant before adding a suffix that starts with a vowel (-ing, -ed, -er). Other examples: run → running, swim → swimming, stop → stopped. Missing this rule is one of the most common Grade 5 spelling errors on standard L.5.2.E.",
    "skill": "Spelling Grade-Appropriate Words",
    "sc": "#633806",

    "type": "std",
    "passageHtml": "<div class=\"passage-label\">Read this dictionary entry</div><div class=\"passage-box\"><b>strain</b> /strān/ <i>verb</i><br>1. to pull or stretch something tightly<br>2. to pour a liquid through a filter to remove solid bits<br>3. to injure a body part by working it too hard<br>4. to try very hard to do something difficult<br><br><i>Example:</i> After cooking the pasta, Mom asked me to <u>strain</u> it over the sink.</div>",
    "qHtml": "Which definition of <span class=\"q-ul\">strain</span> best matches how the word is used in the example sentence?",

  {
    "type": "std",
    "passageHtml": "<div class=\"passage-label\">Read this</div><div class=\"passage-box\">After soccer practice, Maya flopped onto the couch and groaned, \"I'm so tired I could sleep for a year.\" Her little brother laughed and said she was being dramatic, but their mom just smiled and brought her a glass of water.</div>",

    "skill": "Figurative Language: Similes, Metaphors, and Idioms",
    "sc": "#993556",

    "teks": "L.5.5.A",

    "type": "std",
    "passageHtml": "<div class=\"passage-label\">Read this</div><div class=\"passage-box\">Maya joined the school garden club last fall. By the time spring arrived, she ___ many different vegetables, and she was ready to teach the new members.</div>",

var cur=0, sel=null, ddSel=null, submitted=false;
var scores=QS.map(function(){return null;});
var tried=QS.map(function(){return [];});
var lastWrong=null, hintOn=false, hintOpen=false, STATE='quiz';
var EYE='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';

function render(){
  var a=document.getElementById('app');
  if(STATE==='quiz') rQuiz(a);
  else if(STATE==='results') rResults(a);
  else rReview(a);
}

function rQuiz(a){
  var q=QS[cur], t=tried[cur], pct=Math.round((cur/QS.length)*100);
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-label').textContent='Question '+(cur+1)+' of '+QS.length+' · '+q.skill;

  var ph=q.passageHtml||'';
  var qt='<div class="q-text">'+(q.qHtml||q.q||'')+'</div>';
  var ih='', fb='';

  if(q.type==='std'){
    ih=rStd(q,t);
    if(lastWrong&&!submitted) fb='<div class="feedback wrong">✗ '+lastWrong+'</div>';
    if(submitted) fb='<div class="feedback correct">✓ '+q.exp+'</div>';
  } else if(q.type==='dropdown'){
    ih=rDD(q);
    if(submitted) fb='<div class="feedback correct">✓ '+q.exp+'</div>';
    else if(lastWrong) fb='<div class="feedback wrong">✗ '+lastWrong+'</div>';
  }

  var hb=q.hint?'<button class="hint-btn'+(hintOn?' visible':'')+'" onclick="tHint()">'+EYE+(hintOpen?' Hide hint':' Show hint')+'</button>':'';
  var hr=q.hint?'<div class="hint-reveal'+(hintOpen?' open':'')+'"><strong>Hint:</strong> '+q.hint+'</div>':'';

  var ok=(q.type==='std')?(sel!==null&&!submitted):(ddSel!==null&&!submitted);
  var cb=!submitted?'<button class="btn btn-check"'+(ok?'':' disabled')+' onclick="doSub()">Check answer</button>':'';
  var nb=submitted?'<button class="btn btn-next" onclick="nxt()">Next question →</button>':'';
  var backCls=cur===0?'btn btn-back hidden':'btn btn-back';

  a.innerHTML=
    '<div class="badge-row"><span class="skill-badge" style="background:'+q.sb+';color:'+q.sc+'">'+q.skill+'</span><span class="maps-tag">'+q.mapsTo+'</span></div>'+
    '<div class="q-card">'+ph+qt+
    '<div class="tip-box"><div class="tip-header"><span class="tip-label">Coaching Tip</span>'+hb+'</div><div class="tip-text">'+q.tip+'</div>'+hr+'</div>'+
    ih+fb+
    '<div class="btn-row"><button class="'+backCls+'" onclick="bk()">← Back</button>'+cb+nb+'</div>'+
    '</div>';
}

function rStd(q,t){
  return '<div class="options">'+q.opts.map(function(o,i){
    var c='opt';
    if(t.indexOf(i)!==-1) c+=' wrong-tried disabled';
    else if(submitted&&i===q.ans) c+=' correct disabled';
    else if(!submitted&&sel===i) c+=' selected';
    else if(submitted) c+=' disabled';
    return '<div class="'+c+'" onclick="sO('+i+')"><div class="opt-letter">'+String.fromCharCode(65+i)+'</div><div class="opt-text">'+o+'</div></div>';
  }).join('')+'</div>';
}

function rDD(q){
  var opts=q.dropOptions.map(function(x,i){
    return '<option value="'+i+'"'+(ddSel===i?' selected':'')+'>'+x+'</option>';
  }).join('');
  var sel2=submitted
    ?'<select class="dd-select" disabled><option>'+q.dropOptions[q.ans]+'</option></select>'
    :'<select class="dd-select" onchange="sDD(this.value)"><option value="">— choose —</option>'+opts+'</select>';
  return '<div class="dropdown-row">'+(q.dropBefore||'')+' '+sel2+' '+(q.dropAfter||'')+'</div>';
}

function sO(i){ if(submitted||tried[cur].indexOf(i)!==-1)return; sel=i; lastWrong=null; render(); }
function sDD(v){ ddSel=v===''?null:parseInt(v); lastWrong=null; render(); }
function tHint(){ if(!hintOn)return; hintOpen=!hintOpen; render(); }

function doSub(){
  if(submitted)return;
  var q=QS[cur];
  if(q.type==='std'){
    if(sel===null)return;
    if(sel===q.ans){ submitted=true; scores[cur]=tried[cur].length===0; lastWrong=null; }
    else{ tried[cur].push(sel); hintOn=true; lastWrong=q.wrongs[sel]||"Not quite — use the hint for more guidance."; sel=null; }
  } else if(q.type==='dropdown'){
    if(ddSel===null)return;
    if(ddSel===q.ans){ submitted=true; scores[cur]=tried[cur].length===0; lastWrong=null; }
    else{ tried[cur].push(ddSel); hintOn=true; lastWrong="That word doesn't match the direction or meaning of the original. Use the hint."; ddSel=null; }
  }
  render();
}

function nxt(){
  if(cur<QS.length-1){
    cur++; sel=null; ddSel=null; submitted=false; lastWrong=null; hintOn=false; hintOpen=false; render();
  } else {
    STATE='results';
    document.getElementById('prog-fill').style.width='100%';
    document.getElementById('prog-label').textContent='Complete!';
    render();
  }
}

function bk(){
  if(cur===0)return;
  cur--; sel=null; ddSel=null;
  submitted=scores[cur]!==null;
  lastWrong=null; hintOn=false; hintOpen=false;
  render();
}

function rResults(a){
  var ft=scores.filter(function(s){return s===true;}).length, tot=QS.length, pct=Math.round((ft/tot)*100);
  var sm={};
  QS.forEach(function(q,i){
    if(!sm[q.skill]) sm[q.skill]={tot:0,ok:0};
    sm[q.skill].tot++;
    if(scores[i]===true) sm[q.skill].ok++;
  });
  var rows=Object.keys(sm).map(function(sk){
    var d=sm[sk], ok=d.ok===d.tot;
    return '<tr><td>'+sk+'</td><td>'+d.ok+' / '+d.tot+'</td><td><span class="'+(ok?'pill-ok':'pill-no')+'">'+(ok?'✓ Mastered':'⚠ Review')+'</span></td></tr>';
  }).join('');
  var r=52, c=2*Math.PI*r, d=(pct/100)*c;
  a.innerHTML='<div class="results-card">'+
    '<div class="score-ring"><svg width="120" height="120" viewBox="0 0 120 120">'+
    '<circle cx="60" cy="60" r="'+r+'" fill="none" stroke="#e5e3f7" stroke-width="12"/>'+
    '<circle cx="60" cy="60" r="'+r+'" fill="none" stroke="#534AB7" stroke-width="12" stroke-dasharray="'+d.toFixed(1)+' '+c.toFixed(1)+'" stroke-linecap="round"/>'+
    '</svg><div class="score-pct">'+pct+'%</div></div>'+
    '<div class="results-title">Practice Complete!</div>'+
    '<div class="results-sub">'+ft+' of '+tot+' first-try correct · Targeted for N/A</div>'+
    '<table class="skill-table"><thead><tr><th>Skill</th><th>Score</th><th>Status</th></tr></thead><tbody>'+rows+'</tbody></table>'+
    '<button class="btn" style="background:#f0eefd;color:#534AB7;border:2px solid #534AB7;margin-right:8px" onclick="STATE='review';render()">Review all answers</button>'+
    '<button class="btn" style="background:#534AB7;color:#fff" onclick="restart()">Practice again</button>'+
    '</div>';
}

function restart(){
  cur=0; sel=null; ddSel=null; submitted=false;
  scores=QS.map(function(){return null;});
  tried=QS.map(function(){return [];});
  lastWrong=null; hintOn=false; hintOpen=false; STATE='quiz';
  document.getElementById('prog-fill').style.width='0%';
  render();
}

function rReview(a){
  var html='<div class="rev-top">'+
    '<button class="btn" style="background:#f0eefd;color:#534AB7;border:2px solid #534AB7" onclick="STATE='results';render()">← Back to results</button>'+
    '<button class="btn" style="background:#534AB7;color:#fff" onclick="restart()">Practice again</button>'+
    '</div>';
  QS.forEach(function(q,i){
    var ft=scores[i]===true, t=tried[i], att=t.length+1;
    var lbl=ft?'✓ First try':'✗ Needed '+att+' attempt'+(att>1?'s':'');
    var cls='rev-card '+(ft?'ft':'nr');
    var ph=q.passageHtml?q.passageHtml.replace('passage-box','rev-pass'):'';
    var qt=q.qHtml||q.q||'';
    var arr=q.type==='dropdown'?q.dropOptions:q.opts;
    var oh=arr.map(function(x,j){
      var oc='rev-opt '+(j===q.ans?'c':t.indexOf(j)!==-1?'w':'n');
      return '<div class="'+oc+'"><strong>'+String.fromCharCode(65+j)+'.</strong> '+x+'</div>';
    }).join('');
    html+='<div class="'+cls+'">'+
      '<div class="rev-label">'+
        '<span style="color:'+q.sc+'">'+q.skill+' · '+q.teks+' · '+q.mapsTo+'</span>'+
        '<span style="color:'+(ft?'#145a38':'#8B1A1A')+'">'+lbl+'</span>'+
      '</div>'+
      ph+'<div class="rev-q">'+qt+'</div>'+oh+
      '<div class="rev-exp"><strong>Why:</strong> '+q.exp+'</div>'+
    '</div>';
  });
  a.innerHTML=html;
}

render();
</script>
</body>
</html>
